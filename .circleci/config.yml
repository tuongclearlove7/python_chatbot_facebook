version: 2.1

executors:
  python-ssh-executor:
    docker:
      - image: cimg/python:3.11  # Python version bạn dùng
    working_directory: ~/repo

jobs:
  deploy:
    executor: python-ssh-executor
    steps:
      - checkout

      # Cài SSH client
      - run:
          name: Install SSH client
          command: |
            sudo apt-get update
            sudo apt-get install -y openssh-client

      # Tạo file SSH key từ secret
      - run:
          name: Setup SSH Key
          command: |
            echo "$SSH_PRIVATE_KEY" > ~/temp_ssh_key
            chmod 600 ~/temp_ssh_key

      # Kiểm tra biến môi trường USER_NAME
      - run:
          name: Check USER_NAME
          command: |
            echo "USER_NAME = $USER_NAME"

      # Test SSH trước
      - run:
          name: Test SSH connection
          command: |
            ssh -i ~/temp_ssh_key -o StrictHostKeyChecking=no $USER_NAME@103.161.97.193 "echo 'SSH connection OK'"

      # Deploy Python Chatbot
      - run:
          name: Deploy Python Chatbot
          command: |
            echo "=== Starting deployment ==="
            ssh -i ~/temp_ssh_key -o StrictHostKeyChecking=no $USER_NAME@103.161.97.193 \
              "bash ~/devops/deploy_python_chatbot_facebook.sh"
            echo "=== Deployment finished ==="

workflows:
  version: 2
  deploy_workflow:
    jobs:
      - deploy