version: '3.9'

services:
  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-webhook
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - chatbot-network
    working_dir: /app
    command: uvicorn app:app --host 0.0.0.0 --port 8000

networks:
  chatbot-network:
    driver: bridge