version: '3.9'

services:
  webhook:
    image: tuongclearlove7777/python-chatbot-facebook:latest
    container_name: chatbot-webhook
    ports:
      - "9000:8000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge