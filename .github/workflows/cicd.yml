name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Python Chatbot Facebook
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 103.161.97.193
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Starting deployment ==="
            cd ~/devops && ./deploy_python_chatbot_facebook.sh
            echo "=== Deployment process finished ==="
